<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anti-Gravity Puzzle</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
  <h1>Anti-Gravity Puzzle</h1>
  
  <div id="grid"></div>
  
  <p class="stats">Moves: <span id="moves">0</span></p>
</div>

<!-- Start overlay to initialize audio context / device orientation on iOS -->
<div id="start-overlay" class="overlay">
  <div class="overlay-content">
    <h2>Ready to Play?</h2>
    <p>Tilt your device to move the ball to the hole.</p>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
