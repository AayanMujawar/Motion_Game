<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Motion Puzzle — Pick &amp; Place</title>
  <meta name="description"
    content="A motion puzzle game. Select a piece and place it on a valid cell in 4 cardinal directions. Get the ball into the hole in minimum moves!">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Confetti Layer -->
  <div id="confetti-container"></div>

  <div id="app">
    <!-- Header -->
    <header id="header">
      <button id="menu-btn" class="icon-btn" aria-label="Level Select">
        <span class="material-icons-round">menu</span>
      </button>
      <div id="level-indicator">
        <span id="level-label">Level</span>
        <span id="level-number">1</span>
        <span id="level-name">First Slide</span>
      </div>
      <button id="reset-btn" class="icon-btn" aria-label="Reset Level">
        <span class="material-icons-round">refresh</span>
      </button>
    </header>

    <!-- Instruction -->
    <p id="instruction">Tap the ball or a movable block to select it.</p>

    <!-- Game Board -->
    <div id="board-wrapper">
      <div id="board"></div>
    </div>

    <!-- Bottom Toolbar -->
    <div id="toolbar">
      <div id="move-counter">
        <span class="material-icons-round">swap_horiz</span>
        <span id="moves">0</span>
        <span class="move-separator">/</span>
        <span id="min-moves" class="min-moves-val">1</span>
      </div>
      <button id="undo-btn" class="tool-btn" aria-label="Undo">
        <span class="material-icons-round">undo</span>
      </button>
      <button id="next-btn" class="tool-btn primary" aria-label="Next Level" disabled>
        <span class="material-icons-round">arrow_forward</span>
      </button>
    </div>
  </div>

  <!-- Win Modal -->
  <div id="win-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-icon">🎉</div>
      <h2>Level Complete!</h2>
      <div class="win-stats">
        <div class="stat">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="win-moves">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Target</span>
          <span class="stat-value target" id="win-min">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value best" id="win-best">0</span>
        </div>
      </div>
      <div class="modal-stars" id="stars"></div>
      <button id="modal-next-btn" class="btn-primary">Next Level</button>
    </div>
  </div>

  <!-- Level Select Modal -->
  <div id="level-modal" class="modal hidden">
    <div class="modal-card level-select-card">
      <h2>Select Level</h2>
      <div id="level-grid"></div>
      <button id="close-level-modal" class="btn-secondary">Close</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>

</html>
